<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GHC Logo Export</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      background: transparent;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    /* Checker grid preview background */
    body.checker {
      background-image:
        linear-gradient(45deg, #cbd5e1 25%, transparent 25%),
        linear-gradient(-45deg, #cbd5e1 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #cbd5e1 75%),
        linear-gradient(-45deg, transparent 75%, #cbd5e1 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: #f1f5f9;
    }

    /* ── Logo lockup ─────────────────────────── */
    .lockup {
      display: flex;
      align-items: center;
      gap: 20px;
      width: 500px;
    }

    .logo-pill {
      flex-shrink: 0;
      width: 100px;
      height: 100px;
      border-radius: 14px;
      background: linear-gradient(135deg, #38bdf8, #34d399);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 32px 4px rgba(56, 189, 248, 0.6);
      font-weight: 900;
      font-size: 36px;
      color: #0f172a;
      letter-spacing: -0.03em;
    }

    .brand-text {
      font-weight: 700;
      font-size: 38px;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      font-style: italic;
      line-height: 1;
      /* sky → indigo → emerald gradient, matching .glow-text palette */
      background: linear-gradient(90deg, #38bdf8, #818cf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Toggle button ───────────────────────── */
    .controls {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid rgba(56, 189, 248, 0.4);
      background: rgba(2, 6, 23, 0.85);
      color: #94a3b8;
      font-family: ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn:hover {
      border-color: rgba(56, 189, 248, 0.8);
      color: #38bdf8;
    }

    .btn.active {
      border-color: #38bdf8;
      color: #38bdf8;
    }
  </style>
</head>
<body class="checker">

  <div class="lockup">
    <div class="logo-pill">GHC</div>
    <span class="brand-text">Glasshouse_Concepts</span>
  </div>

  <div class="controls">
    <button class="btn active" id="btn-checker" onclick="setBackground('checker')">Checker Grid</button>
    <button class="btn" id="btn-dark"    onclick="setBackground('dark')">Dark</button>
    <button class="btn" id="btn-white"   onclick="setBackground('white')">White</button>
    <button class="btn" id="btn-clear"   onclick="setBackground('clear')">Transparent</button>
  </div>

  <script>
    const modes = {
      checker: { bodyClass: 'checker', style: '' },
      dark:    { bodyClass: '',        style: 'background:#020617' },
      white:   { bodyClass: '',        style: 'background:#ffffff' },
      clear:   { bodyClass: '',        style: 'background:transparent' },
    };

    function setBackground(mode) {
      const body = document.body;
      body.className = modes[mode].bodyClass;
      body.style.background = modes[mode].style === '' ? '' : '';
      if (modes[mode].style) {
        const [prop, val] = modes[mode].style.split(':');
        body.style[prop.trim()] = val.trim();
      }
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + mode).classList.add('active');
    }
  </script>
</body>
</html>
