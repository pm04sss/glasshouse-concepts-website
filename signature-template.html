<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GHC Email Signature</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background: #0f172a;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .page-label {
      font-family: ui-monospace, 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #475569;
    }

    .preview-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 32px;
      max-width: 640px;
      width: 100%;
    }

    .copy-note {
      font-family: ui-monospace, 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #64748b;
      text-align: center;
    }

    .copy-note span {
      color: #38bdf8;
    }
  </style>
</head>
<body>

  <p class="page-label">// GHC — Email Signature Template</p>

  <!-- ═══════════════════════════════════════════════
       PREVIEW CARD (white background = email canvas)
       ═══════════════════════════════════════════════ -->
  <div class="preview-card">

    <!--
      ╔══════════════════════════════════════════════════╗
      ║  EMAIL SIGNATURE — COPY EVERYTHING BELOW        ║
      ║  into your email client's signature editor      ║
      ║  (Gmail → Settings → Signature / Outlook → ...)║
      ╚══════════════════════════════════════════════════╝
    -->

    <!-- Outer wrapper table — max 560px, no border, no padding -->
    <table
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="border-collapse:collapse;max-width:560px;width:100%;font-family:ui-sans-serif,system-ui,-apple-system,Arial,sans-serif;">
      <tbody>
        <tr>

          <!-- ── Column 1: GHC Logo pill ───────────────── -->
          <td
            valign="middle"
            style="padding:0 20px 0 0;vertical-align:middle;">
            <table
              cellpadding="0"
              cellspacing="0"
              border="0"
              style="border-collapse:collapse;">
              <tbody>
                <tr>
                  <td
                    style="
                      width:64px;
                      height:64px;
                      border-radius:10px;
                      background:linear-gradient(135deg,#38bdf8,#34d399);
                      text-align:center;
                      vertical-align:middle;
                      font-weight:900;
                      font-size:22px;
                      color:#0f172a;
                      letter-spacing:-0.03em;
                      font-family:ui-sans-serif,system-ui,-apple-system,Arial,sans-serif;
                      box-shadow:0 0 18px 3px rgba(56,189,248,0.55);
                    ">
                    GHC
                  </td>
                </tr>
              </tbody>
            </table>
          </td>

          <!-- ── Column 2: Thin vertical divider ──────── -->
          <td
            style="
              width:1px;
              background:linear-gradient(180deg,#38bdf8,#34d399);
              padding:0;
              vertical-align:middle;">
            <!-- 1px gradient rule -->
            <div style="width:1px;height:64px;"></div>
          </td>

          <!-- ── Column 3: Name + Title + Contact ─────── -->
          <td
            valign="middle"
            style="padding:0 0 0 20px;vertical-align:middle;">

            <!-- Name -->
            <p style="
              margin:0 0 2px 0;
              font-size:17px;
              font-weight:700;
              letter-spacing:-0.02em;
              color:#0f172a;
              line-height:1.2;">
              [Your Name]
            </p>

            <!-- Title -->
            <p style="
              margin:0 0 10px 0;
              font-size:11px;
              font-weight:400;
              letter-spacing:0.08em;
              text-transform:uppercase;
              color:#64748b;
              font-family:ui-monospace,'Courier New',monospace;
              line-height:1.4;">
              Systems Architect&nbsp;&nbsp;/&nbsp;&nbsp;Glasshouse Concepts
            </p>

            <!-- Hairline separator -->
            <table
              cellpadding="0"
              cellspacing="0"
              border="0"
              style="border-collapse:collapse;margin-bottom:10px;">
              <tbody>
                <tr>
                  <td style="
                    height:1px;
                    width:200px;
                    background:linear-gradient(90deg,#38bdf8,transparent);
                    padding:0;
                    font-size:0;
                    line-height:0;">
                    &nbsp;
                  </td>
                </tr>
              </tbody>
            </table>

            <!-- Email -->
            <p style="
              margin:0 0 3px 0;
              font-size:11px;
              font-family:ui-monospace,'Courier New',monospace;
              letter-spacing:0.04em;
              line-height:1.5;">
              <a
                href="mailto:admin@glasshouseconcepts.io"
                style="color:#38bdf8;text-decoration:none;">
                admin@glasshouseconcepts.io
              </a>
            </p>

            <!-- Website -->
            <p style="
              margin:0;
              font-size:11px;
              font-family:ui-monospace,'Courier New',monospace;
              letter-spacing:0.04em;
              line-height:1.5;">
              <a
                href="https://www.glasshouseconcepts.io"
                style="color:#34d399;text-decoration:none;">
                www.glasshouseconcepts.io
              </a>
            </p>

          </td><!-- /Column 3 -->

        </tr>
      </tbody>
    </table>
    <!-- END SIGNATURE -->

  </div><!-- /preview-card -->

  <p class="copy-note">
    Select the signature above &rarr; copy &rarr; paste into
    <span>Gmail Settings → Signature</span> or
    <span>Outlook → Insert → Signature</span>
  </p>

</body>
</html>
