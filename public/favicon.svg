<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.06
                0 0 0 0 0.65
                0 0 0 0 0.92
                0 0 0 1.4 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark base for contrast -->
  <rect x="4" y="4" width="56" height="56" rx="13" fill="#0f172a"/>
  <!-- Gradient pill with glow -->
  <rect x="4" y="4" width="56" height="56" rx="13" fill="url(#bg)" opacity="0.85" filter="url(#glow)"/>
  <!-- High-contrast white text -->
  <text
    x="32"
    y="45"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="-1"
    fill="#ffffff">GHC</text>
</svg>
